name: Projects Builder
on:
  workflow_call:
    inputs:
      baseDir:
        description: 'Base Directory with suffix /'
        required: false
        type: string
        default: ''
      name:
        description: 'Project Name'
        required: true
        type: string
        default: ''
      sonarProjectName:
        description: 'Sonar Project Key'
        required: false
        type: string
        default: ''
      sonarOrganization:
        description: 'Sonar Organization'
        required: false
        type: string
        default: ''
      publishToCentral:
        description: 'Whether or not to publish to the central repository'
        required: false
        type: string
        default: 'false'
      skipDeploy:
        description: 'Skip deploy phase (build and verify only)'
        required: false
        type: string
        default: 'false'
      repository:
        description: 'Alternative repository to checkout (e.g. owner/repo). Uses baseDir for subdirectory within the checked-out repo.'
        required: false
        type: string
        default: ''
    secrets:
      USERNAME:
        required: true
        description: 'Username for Github'
      USER_TOKEN:
        required: true
        description: 'The supplied token for Github'
      SONA_USERNAME:
        required: true
        description: 'Username for Maven Central'
      SONA_PASSWORD:
        required: true
        description: 'Passphrase for Maven Central'
      GPG_PASSPHRASE:
        required: false
        description: 'Passphrase for GPG'
      GPG_PRIVATE_KEY:
        required: false
        description: 'A GPG private key '
permissions:
  contents: read
  packages: write
  pull-requests: write   # needed for PR decoration
  checks: write          # needed for check run updates
env:
  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
  EFFECTIVE_BASE_DIR: ${{ inputs.baseDir }}
  POM_FILE: ${{ format('{0}pom.xml', inputs.baseDir) }}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        java-version: [ 25 ]
    name: ${{ inputs.name }} Builder
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}
          token: ${{ secrets.USER_TOKEN || github.token }}
      - name: Set up Java
        uses: actions/setup-java@v4.2.1
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'oracle'
          #server-id: github_token
          #settings-path: ${{ github.workspace }}
          #cache: 'maven'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Setup Maven
        uses: actionctl/setup-maven-cli@v1
        with:
          maven_version: '4.0.0-rc-5'
          download_url_pattern: 'https://dlcdn.apache.org/maven/maven-4/4.0.0-rc-5/binaries/apache-maven-4.0.0-rc-5-bin.tar.gz'
      - name: Update Settings.xml
        uses: s4u/maven-settings-action@v4.0.0
        with:
          sonatypeSnapshots: true
          servers: >
            [
              {
                "id": "github",
                "username": "${{secrets.USERNAME}}",
                "password": "${{secrets.USER_TOKEN}}"
              },{
                "id": "packages",
                "username": "${{secrets.USERNAME}}",
                "password": "${{secrets.USER_TOKEN}}"
              },
              {
                "id": "packages_jwebmp",
                "username": "${{secrets.USERNAME}}",
                "password": "${{secrets.USER_TOKEN}}"
              },
              {
                "id": "sona-snapshot",
                "username": "${{secrets.SONA_USERNAME}}",
                "password": "${{secrets.SONA_PASSWORD}}"
              },
              {
                "id": "sona-release",
                "username": "${{secrets.SONA_USERNAME}}",
                "password": "${{secrets.SONA_PASSWORD}}"
              }
            ]
          repositories: >
            [
              {
                "id": "packages",
                "name": "packages",
                "url": "https://maven.pkg.github.com/GuicedEE/Packages",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true"
                }
              },
            {
              "id": "packages_jwebmp",
              "name": "packages_jwebmp",
              "url": "https://maven.pkg.github.com/JWebMP/Packages",
              "releases": {
                "enabled": "true"
              },
              "snapshots": {
                "enabled": "true"
              }
            },
              {
                "id": "shibboleth",
                "name": "shibboleth",
                "url": "https://build.shibboleth.net/nexus/content/repositories/releases",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true"
                }
              }
            ]

      - name: Verify
        run: mvn -B verify --file ${{ env.EFFECTIVE_BASE_DIR }}pom.xml -U -Pcoverage

      - name: Print event name
        run: echo "github.event_name=${{ github.event_name }}"

      - name: SonarCloud analyze
        uses: SonarSource/sonarqube-scan-action@v7
        if: ${{ inputs.sonarProjectName != '' && inputs.sonarOrganization != '' && (github.event_name == 'pull_request' || github.event_name == 'push'  || github.event_name == 'workflow_dispatch' ) }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonarProjectName }}
            -Dsonar.organization=${{ inputs.sonarOrganization }}
            -Dsonar.projectBaseDir=${{ env.EFFECTIVE_BASE_DIR }}
            -Dsonar.language=java
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.test.binaries=target/test-classes
            -Dsonar.java.libraries=target/dependency/**/*.jar
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.exclusions=**/src/test/**,**/target/**
            -Dsonar.test.exclusions=**/src/test/**

      - name: Deploy
        if: ${{ inputs.skipDeploy != 'true' && inputs.publishToCentral != 'true' }}
        run: mvn -B source:jar javadoc:jar deploy --file ${{ env.EFFECTIVE_BASE_DIR }}pom.xml -U -DskipTests=true

      - name: Deploy to Central
        if: ${{ inputs.skipDeploy != 'true' && inputs.publishToCentral == 'true' }}
        run: mvn -B source:jar javadoc:jar install deploy --file ${{ env.EFFECTIVE_BASE_DIR }}pom.xml -U -Psonatype-distribution,release

