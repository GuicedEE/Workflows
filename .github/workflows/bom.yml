name: BOM Builder
on:
  workflow_call:
    inputs:
      baseDir:
        description: 'Base Directory with suffix /'
        required: false
        type: string
        default: ''
      name:
        description: 'BOM Name'
        required: true
        type: string
        default: ''
      publishToCentral:
        description: 'Whether or not to publish to the central repository'
        required: false
        type: string
        default: 'false'
      repository:
        description: 'Alternative repository to checkout (e.g. owner/repo). Uses baseDir for subdirectory within the checked-out repo.'
        required: false
        type: string
        default: ''
      createRelease:
        description: 'Create a Git tag and GitHub Release after deploy (non-SNAPSHOT only)'
        required: false
        type: string
        default: 'false'
    secrets:
      USERNAME:
        required: true
        description: 'Username for Github'
      USER_TOKEN:
        required: true
        description: 'The supplied token for Github'
      SONA_USERNAME:
        required: true
        description: 'Username for Maven Central'
      SONA_PASSWORD:
        required: true
        description: 'Passphrase for Maven Central'
      GPG_PASSPHRASE:
        required: false
        description: 'Passphrase for GPG'
      GPG_PRIVATE_KEY:
        required: false
        description: 'A GPG private key '
permissions:
  contents: write
  packages: write
env:
  GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
  GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        java-version: [ 25 ]
    name: ${{ inputs.name }} Builder
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          token: ${{ secrets.USER_TOKEN || github.token }}
      - name: Set up Java
        uses: actions/setup-java@v4.2.1
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'oracle'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Update Settings.xml
        uses: s4u/maven-settings-action@45b6ca948aeeb205adebe97c67b26e2b50896844 # v4.0.0
        with:
          apacheSnapshots: true
          sonatypeSnapshots: true
          servers: >
            [
              {
                "id": "github",
                "username": "${{secrets.USERNAME}}",
                "password": "${{secrets.USER_TOKEN}}"
              },{
                "id": "packages",
                "username": "${{secrets.USERNAME}}",
                "password": "${{secrets.USER_TOKEN}}"
              },
              {
                "id": "packages_jwebmp",
                "username": "${{secrets.USERNAME}}",
                "password": "${{secrets.USER_TOKEN}}"
              },
              {
                "id": "central",
                "username": "${{secrets.SONA_USERNAME}}",
                "password": "${{secrets.SONA_PASSWORD}}"
              },
              {
                "id": "sona-snapshot",
                "username": "${{secrets.SONA_USERNAME}}",
                "password": "${{secrets.SONA_PASSWORD}}"
              },
              {
                "id": "sona-release",
                "username": "${{secrets.SONA_USERNAME}}",
                "password": "${{secrets.SONA_PASSWORD}}"
              }
            ]
          repositories: >
            [
              {
                "id": "packages",
                "name": "packages",
                "url": "https://maven.pkg.github.com/GuicedEE/Packages",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true"
                }
              },
            {
              "id": "packages_jwebmp",
              "name": "packages_jwebmp",
              "url": "https://maven.pkg.github.com/JWebMP/Packages",
              "releases": {
                "enabled": "true"
              },
              "snapshots": {
                "enabled": "true"
              }
            },
              {
                "id": "shibboleth",
                "name": "shibboleth",
                "url": "https://build.shibboleth.net/nexus/content/repositories/releases",
                "releases": {
                  "enabled": "true"
                },
                "snapshots": {
                  "enabled": "true"
                }
              }
            ]
      - name: Cache Maven dependencies
        uses: actions/cache@v5.0.4
        with:
          path: ~/.m2/repository
          key: maven-cache-${{inputs.name}}
          restore-keys: |
            maven-cache-${{inputs.name}}
      - name: Setup Maven
        uses: actionctl/setup-maven-cli@91780e83e5ea177cd5f05e192d38008a0bd3d4c6 # v1
        with:
          maven_version: '4.0.0-rc-5'
          download_url_pattern: 'https://dlcdn.apache.org/maven/maven-4/4.0.0-rc-5/binaries/apache-maven-4.0.0-rc-5-bin.tar.gz'
      - name: Build
        run:
          mvn -B deploy --file ${{inputs.baseDir}}pom.xml -U ${{inputs.publishToCentral == 'true' && '-Dcentral.publishing.skip=false -Dmaven.deploy.skip=true' || ' '}}
      - name: Wait for Central propagation
        if: ${{ inputs.publishToCentral == 'true' }}
        run: |
          DELAY=$((120 + RANDOM % 61))
          echo "Waiting ${DELAY}s for Maven Central to propagate artifacts…"
          sleep "$DELAY"

      - name: Create Release Tag
        if: ${{ inputs.createRelease == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.USER_TOKEN || github.token }}
        run: |
          VERSION=$(grep -m1 '<version>' ${{ inputs.baseDir }}pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          if echo "$VERSION" | grep -q "SNAPSHOT"; then
            echo "SNAPSHOT version ($VERSION) – skipping tag/release"
            exit 0
          fi
          TAG="v${VERSION}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping release creation"
            exit 0
          fi
          echo "Creating tag $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $VERSION"
          git push origin "$TAG"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            gh release create "$TAG" --title "Release $VERSION" --generate-notes --notes-start-tag "$PREV_TAG"
          else
            gh release create "$TAG" --title "Release $VERSION" --notes "Initial release $VERSION"
          fi

